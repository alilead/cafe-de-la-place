
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe de la Place | Suivi financier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0, 55, 221, 0.1);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 55, 221, 0.2);
      }

      @keyframes neural-pulse {
        0% { box-shadow: 0 0 0 0 rgba(0, 55, 221, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(0, 55, 221, 0); }
        100% { box-shadow: 0 0 0 0 rgba(0, 55, 221, 0); }
      }
      .neural-active {
        animation: neural-pulse 2s infinite;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ypsom: {
                shadow: '#132420',
                deep: '#0037dd',
                alice: '#f6f1ea',
                slate: '#515151',
                darker: '#152d30',
              },
              /* Override Tailwind amber to match the brand gold. */
              amber: {
                50: '#fdf6e9',
                100: '#f4ead0',
                600: '#b89d65',
                700: '#ba9e64',
              }
            },
            boxShadow: {
              'audit': '0 40px 100px -20px rgba(0, 0, 0, 0.15)',
              'forensic': '0 50px 150px -30px rgba(0, 0, 0, 0.4)'
            }
          }
        }
      }
    </script>
